<!DOCTYPE html>

<head>

    <style>

        .btn { border: 2px solid #6366F1; color: #6366F1; padding: 12px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; }
